# Node 2 — joins by contacting node1 as seed

node:
  host: "0.0.0.0"
  port: 5000

gossip:
  target_count: 1
  rate: 0.5

# point to node1 as the seed to discover the cluster
seeds:
  - "node1:5000"

metric_priorities:
  cpu: 1
  memory: 1     
  network: 1    
  storage: 1    

metric_deltas:
  cpu: 0.0
  memory: 0.0
  network: 0.0
  storage: 0.0

state_file: "/mini/state/peer_state.json"

# mTLS — enable to encrypt gossip and lock out unauthorized nodes
tls:
  enabled: false
  ca_cert: "/mini/certs/ca.crt"
  node_cert: "/mini/certs/node2.crt"
  node_key: "/mini/certs/node2.key"

monitoring:
  address: ""
  port: 4000
  send_data_back: false

push_mode: false
