# 2-node standalone PrioMon cluster with mTLS
# No orchestrator needed — nodes discover each other via seeds
#
# Usage:
#   docker-compose -f docker-compose.standalone.yml up --build
#
# Node 1 starts first (as the seed), then node 2 joins it.

services:
  node1:
    build:
      context: ./src/app
      dockerfile: Dockerfile
    image: priomonv1
    environment:
      - PRIOMON_STANDALONE=1
      - PRIOMON_IP=node1
      - PRIOMON_CONFIG=/mini/configs/node1.yaml
    volumes:
      - node1_state:/mini/state
      - ./standalone_configs:/mini/configs:ro
      - ./certs:/mini/certs:ro
    ports:
      - "5001:5000"
    networks:
      - priomon_net
    healthcheck:
      # use curl-style check that works with both HTTP and HTTPS
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node2:
    build:
      context: ./src/app
      dockerfile: Dockerfile
    image: priomonv1
    environment:
      - PRIOMON_STANDALONE=1
      - PRIOMON_IP=node2
      - PRIOMON_CONFIG=/mini/configs/node2.yaml
    volumes:
      - node2_state:/mini/state
      - ./standalone_configs:/mini/configs:ro
      - ./certs:/mini/certs:ro
    ports:
      - "5002:5000"
    networks:
      - priomon_net
    depends_on:
      node1:
        condition: service_healthy

volumes:
  node1_state:
  node2_state:

networks:
  priomon_net:
    driver: bridge
